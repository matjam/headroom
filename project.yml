name: Headroom
options:
  bundleIdPrefix: net.stupendous
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.9.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    PRODUCT_BUNDLE_IDENTIFIER: net.stupendous.headroom

targets:
  Headroom:
    type: application
    platform: macOS
    sources:
      - Headroom
    dependencies:
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: Headroom/Info.plist
        PRODUCT_NAME: Headroom
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.0.0"
        CURRENT_PROJECT_VERSION: "0"
        GIT_COMMIT_SHA: "unknown"
    entitlements:
      path: Headroom/Headroom.entitlements
      properties:
        com.apple.security.network.client: true
